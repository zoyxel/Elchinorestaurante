<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta Giratoria El Chino</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    /* Portrait overlay */
    #portrait-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      gap: 2rem;
    }

    #portrait-overlay.hidden {
      display: none;
    }

    .phone-icon {
      font-size: 4rem;
      animation: rotatePhone 3s ease-in-out infinite;
    }

    @keyframes rotatePhone {
      0%, 20% { transform: rotate(0deg); }
      50%, 70% { transform: rotate(-90deg); }
      100% { transform: rotate(0deg); }
    }

    #portrait-overlay h1 {
      color: #fff;
      font-size: 1.8rem;
      font-weight: bold;
      margin-top: 1rem;
    }

    #portrait-overlay p {
      color: #ccc;
      font-size: 1.1rem;
      max-width: 500px;
      line-height: 1.6;
    }

    /* Container principal */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 1rem;
      width: 100%;
      max-width: 1200px;
    }

    /*
      FLIP CARD — production-safe 3D transform technique.

      Root cause of the mirrored-back-face bug:
      1) The interactive element was a <button>. Buttons (and other form
         controls) are given their own internal rendering/compositing
         behavior by the UA, and several browsers (notably Chrome/Android
         and Safari/iOS) refuse to correctly preserve a 3D transform
         context inside a <button>, flattening the children instead. That
         flattening is what made the "back" face render as a mirrored
         copy of whatever was already visible, rather than showing its
         own backface-visibility:hidden face with the second image.
      2) `overflow: hidden` + `border-radius` were applied directly to the
         element carrying `transform-style: preserve-3d`
         (.flip-inner). Combining clipping with a preserve-3d container is
         a well-known cross-browser bug trigger that also causes
         backface-visibility to be ignored/flattened. The fix is to keep
         clipping/rounding on elements that are NOT themselves part of the
         3D transform context (the outer non-transformed .flip-card, and
         each individual face), and leave the preserve-3d element
         (.flip-inner) free of overflow/border-radius.

      Fix applied below:
      - Interactive element changed from <button> to a <div role="button">
        with tabindex + keyboard handling for parity.
      - overflow/border-radius moved off .flip-inner and onto .flip-card
        (outer, static) and onto .flip-front/.flip-back (each face).
      - backface-visibility set with -webkit-/-moz- prefixes on both faces.
      - translateZ(0) added to each face and to .flip-inner to force GPU
        layer promotion, which avoids z-index/compositing glitches on
        Chrome Android and Safari iOS.
      - transform-style: preserve-3d duplicated with -webkit- prefix.
    */

    .flip-card {
      perspective: 1200px;
      -webkit-perspective: 1200px;
      cursor: pointer;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      transition: box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .flip-card:active {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
    }

    .flip-card:hover {
      box-shadow: 0 25px 70px rgba(255, 0, 0, 0.3);
    }

    .flip-card:focus-visible {
      outline: 3px solid #ff3b30;
      outline-offset: 4px;
    }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      will-change: transform;
    }

    .flip-card.is-flipped .flip-inner {
      transform: rotateY(180deg) translateZ(0);
      -webkit-transform: rotateY(180deg) translateZ(0);
    }

    .flip-card.auto-flip .flip-inner {
      animation: autoFlip 8s ease-in-out 1s forwards;
    }

    @keyframes autoFlip {
      0% { transform: rotateY(0deg) translateZ(0); }
      25% { transform: rotateY(180deg) translateZ(0); }
      50% { transform: rotateY(360deg) translateZ(0); }
      75% { transform: rotateY(540deg) translateZ(0); }
      100% { transform: rotateY(720deg) translateZ(0); }
    }

    .flip-front, .flip-back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      -moz-backface-visibility: hidden;
      transform: rotateY(0deg) translateZ(0);
      -webkit-transform: rotateY(0deg) translateZ(0);
    }

    .flip-back {
      transform: rotateY(180deg) translateZ(0);
      -webkit-transform: rotateY(180deg) translateZ(0);
    }

    .menu-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      background: #000;
      pointer-events: none;
    }

    /* Responsive sizing */
    @media (orientation: portrait) and (max-width: 768px) {
      .flip-card {
        width: calc(100vw - 1rem);
        aspect-ratio: 550 / 366;
      }
    }

    @media (orientation: landscape) {
      .flip-card {
        width: 90vw;
        max-width: 900px;
        aspect-ratio: 550 / 366;
      }
    }

    @media (orientation: portrait) and (min-width: 768px) {
      .flip-card {
        width: 90vw;
        max-width: 600px;
        aspect-ratio: 550 / 366;
      }
    }

    /* Hint text */
    .flip-hint {
      color: #fff;
      font-size: 0.9rem;
      text-align: center;
      font-weight: 500;
      letter-spacing: 0.05em;
      animation: pulse 2s ease-in-out infinite;
      margin-bottom: 1rem;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* Fullscreen hint toast */
    #fs-hint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(220, 38, 38, 0.9);
      color: #fff;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      z-index: 9998;
      opacity: 1;
      transition: opacity 0.5s ease;
      max-width: 90%;
      text-align: center;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    #fs-hint.hidden {
      display: none;
    }

    :fullscreen {
      background: #000;
      overflow: hidden;
    }

    :-webkit-full-screen {
      background: #000;
      overflow: hidden;
    }

    /* Animation demo text */
    .demo-text {
      color: #888;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      opacity: 0;
      animation: fadeOut 2s ease-in 7s forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Portrait orientation overlay -->
  <div id="portrait-overlay" class="hidden">
    <div class="phone-icon">📱</div>
    <div>
      <h1>Gira tu dispositivo</h1>
      <p>Para una mejor experiencia, por favor coloca tu teléfono en modo horizontal</p>
    </div>
  </div>

  <!-- Fullscreen hint -->
  <div id="fs-hint" class="hidden">
    Toca el menú para activar pantalla completa
  </div>

  <!-- Main content -->
  <div class="container">
    <div class="flip-card auto-flip" id="flip-btn" role="button" tabindex="0" aria-pressed="false" aria-label="Girar carta de menú">
      <div class="flip-inner">
        <div class="flip-front">
          <img src="cara1-hamburguesas.webp" alt="Menú - Hamburguesas" class="menu-image" loading="lazy">
        </div>
        <div class="flip-back">
          <img src="cara2-pizzas.webp" alt="Menú - Pizzas" class="menu-image" loading="lazy">
        </div>
      </div>
    </div>
    <p class="flip-hint">👆 Toca para girar | Toca de nuevo para pantalla completa</p>
    <p class="demo-text">Viendo ambas caras...</p>
  </div>

  <script>
    const card = document.getElementById('flip-btn');
    const overlay = document.getElementById('portrait-overlay');
    const fsHint = document.getElementById('fs-hint');
    let fullscreenRequested = false;
    let isAutoFlipping = true;

    // Detectar si es móvil
    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
             ('ontouchstart' in window) ||
             (navigator.maxTouchPoints && navigator.maxTouchPoints > 2);
    }

    // Revisar orientación
    function checkOrientation() {
      const isPortrait = window.matchMedia('(orientation: portrait)').matches;
      const isMobile = isMobileDevice();

      if (isMobile && isPortrait && !document.fullscreenElement) {
        overlay.classList.remove('hidden');
      } else {
        overlay.classList.add('hidden');
      }
    }

    // Detener animación de auto-flip después de 9 segundos
    setTimeout(() => {
      isAutoFlipping = false;
      card.classList.remove('auto-flip');
    }, 9000);

    // Lógica compartida de activación (click y teclado)
    async function activateCard(event) {
      event.preventDefault();

      if (isAutoFlipping) return; // No permitir activación durante auto-flip

      // Girar la tarjeta
      const isFlipped = card.classList.toggle('is-flipped');
      card.setAttribute('aria-pressed', String(isFlipped));

      // Solicitar fullscreen al tocar (después de girar)
      if (!fullscreenRequested && !document.fullscreenElement) {
        fullscreenRequested = true;

        const elem = document.documentElement;
        const requestFullscreen = elem.requestFullscreen ||
                                 elem.webkitRequestFullscreen ||
                                 elem.mozRequestFullScreen ||
                                 elem.msRequestFullscreen;

        if (requestFullscreen) {
          try {
            await requestFullscreen.call(elem);
            showFsHint();
          } catch (error) {
            fullscreenRequested = false;
            console.log('Fullscreen no disponible:', error);
          }
        }
      }
    }

    // Evento de click/tap en la tarjeta
    card.addEventListener('click', activateCard);

    // Evento de teclado (Enter / Espacio) — paridad de accesibilidad
    // ahora que el elemento es un <div> en lugar de un <button>
    card.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ' || event.key === 'Spacebar') {
        activateCard(event);
      }
    });

    // Mostrar hint de fullscreen
    function showFsHint() {
      fsHint.classList.remove('hidden');
      setTimeout(() => {
        fsHint.style.opacity = '0';
      }, 3500);
      setTimeout(() => {
        fsHint.classList.add('hidden');
        fsHint.style.opacity = '1';
      }, 4000);
    }

    // Escuchar cambios de fullscreen
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        fullscreenRequested = false;
      }
      checkOrientation();
    });

    document.addEventListener('webkitfullscreenchange', () => {
      if (!document.webkitFullscreenElement) {
        fullscreenRequested = false;
      }
      checkOrientation();
    });

    // Escuchar cambios de orientación
    window.addEventListener('orientationchange', checkOrientation);
    window.addEventListener('resize', checkOrientation);

    // Inicializar
    checkOrientation();

    // Mostrar hint de fullscreen después de la animación
    setTimeout(() => {
      if (isMobileDevice()) {
        showFsHint();
      }
    }, 10000);
  </script>
</body>
</html>
