<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta Giratoria El Chino</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    /* Portrait overlay */
    #portrait-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      gap: 2rem;
    }

    #portrait-overlay.hidden {
      display: none;
    }

    .phone-icon {
      font-size: 4rem;
      animation: rotatePhone 3s ease-in-out infinite;
    }

    @keyframes rotatePhone {
      0%, 20% { transform: rotate(0deg); }
      50%, 70% { transform: rotate(-90deg); }
      100% { transform: rotate(0deg); }
    }

    #portrait-overlay h1 {
      color: #fff;
      font-size: 1.8rem;
      font-weight: bold;
      margin-top: 1rem;
    }

    #portrait-overlay p {
      color: #ccc;
      font-size: 1.1rem;
      max-width: 500px;
      line-height: 1.6;
    }

    /* Container principal */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 1rem;
      width: 100%;
      max-width: 1200px;
    }

    /* Flip card */
    .flip-card {
      perspective: 1200px;
      cursor: pointer;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      transition: transform 0.2s ease;
    }

    .flip-card:active {
      transform: scale(0.98);
    }

    .flip-card:hover {
      box-shadow: 0 25px 70px rgba(255, 0, 0, 0.3);
    }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform-style: preserve-3d;
      border-radius: 16px;
      overflow: hidden;
    }

    .flip-card.is-flipped .flip-inner {
      transform: rotateY(180deg);
    }

    .flip-card.auto-flip .flip-inner {
      animation: autoFlip 8s ease-in-out 1s forwards;
    }

    @keyframes autoFlip {
      0% { transform: rotateY(0deg); }
      25% { transform: rotateY(180deg); }
      50% { transform: rotateY(360deg); }
      75% { transform: rotateY(540deg); }
      100% { transform: rotateY(720deg); }
    }

    .flip-front, .flip-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      overflow: hidden;
    }

    .flip-back {
      transform: rotateY(180deg);
    }

    .menu-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      background: #000;
    }

    /* Responsive sizing */
    @media (orientation: portrait) and (max-width: 768px) {
      .flip-card {
        width: calc(100vw - 1rem);
        aspect-ratio: 550 / 366;
      }
    }

    @media (orientation: landscape) {
      .flip-card {
        width: 90vw;
        max-width: 900px;
        aspect-ratio: 550 / 366;
      }
    }

    @media (orientation: portrait) and (min-width: 768px) {
      .flip-card {
        width: 90vw;
        max-width: 600px;
        aspect-ratio: 550 / 366;
      }
    }

    /* Hint text */
    .flip-hint {
      color: #fff;
      font-size: 0.9rem;
      text-align: center;
      font-weight: 500;
      letter-spacing: 0.05em;
      animation: pulse 2s ease-in-out infinite;
      margin-bottom: 1rem;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* Fullscreen hint toast */
    #fs-hint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(220, 38, 38, 0.9);
      color: #fff;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      z-index: 9998;
      opacity: 1;
      transition: opacity 0.5s ease;
      max-width: 90%;
      text-align: center;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    #fs-hint.hidden {
      display: none;
    }

    :fullscreen {
      background: #000;
      overflow: hidden;
    }

    :-webkit-full-screen {
      background: #000;
      overflow: hidden;
    }

    /* Animation demo text */
    .demo-text {
      color: #888;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      opacity: 0;
      animation: fadeOut 2s ease-in 7s forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Portrait orientation overlay -->
  <div id="portrait-overlay" class="hidden">
    <div class="phone-icon">📱</div>
    <div>
      <h1>Gira tu dispositivo</h1>
      <p>Para una mejor experiencia, por favor coloca tu teléfono en modo horizontal</p>
    </div>
  </div>

  <!-- Fullscreen hint -->
  <div id="fs-hint" class="hidden">
    Toca el menú para activar pantalla completa
  </div>

  <!-- Main content -->
  <div class="container">
    <button type="button" class="flip-card auto-flip" id="flip-btn" aria-pressed="false">
      <div class="flip-inner">
        <div class="flip-front">
          <img src="hamburguesas-opt.webp" alt="Menú - Hamburguesas" class="menu-image" loading="lazy">
        </div>
        <div class="flip-back">
          <img src="pizzas-opt.webp" alt="Menú - Pizzas" class="menu-image" loading="lazy">
        </div>
      </div>
    </button>
    <p class="flip-hint">👆 Toca para girar | Toca de nuevo para pantalla completa</p>
    <p class="demo-text">Viendo ambas caras...</p>
  </div>

  <script>
    const card = document.getElementById('flip-btn');
    const overlay = document.getElementById('portrait-overlay');
    const fsHint = document.getElementById('fs-hint');
    let fullscreenRequested = false;
    let isAutoFlipping = true;

    // Detectar si es móvil
    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
             ('ontouchstart' in window) ||
             (navigator.maxTouchPoints && navigator.maxTouchPoints > 2);
    }

    // Revisar orientación
    function checkOrientation() {
      const isPortrait = window.matchMedia('(orientation: portrait)').matches;
      const isMobile = isMobileDevice();

      if (isMobile && isPortrait && !document.fullscreenElement) {
        overlay.classList.remove('hidden');
      } else {
        overlay.classList.add('hidden');
      }
    }

    // Detener animación de auto-flip después de 9 segundos
    setTimeout(() => {
      isAutoFlipping = false;
      card.classList.remove('auto-flip');
    }, 9000);

    // Evento de click en la tarjeta
    card.addEventListener('click', async (event) => {
      event.preventDefault();
      
      if (isAutoFlipping) return; // No permitir click durante auto-flip

      // Girar la tarjeta
      const isFlipped = card.classList.toggle('is-flipped');
      card.setAttribute('aria-pressed', String(isFlipped));

      // Solicitar fullscreen al tocar (después de girar)
      if (!fullscreenRequested && !document.fullscreenElement) {
        fullscreenRequested = true;
        
        const elem = document.documentElement;
        const requestFullscreen = elem.requestFullscreen || 
                                 elem.webkitRequestFullscreen || 
                                 elem.mozRequestFullScreen || 
                                 elem.msRequestFullscreen;
        
        if (requestFullscreen) {
          try {
            await requestFullscreen.call(elem);
            showFsHint();
          } catch (error) {
            fullscreenRequested = false;
            console.log('Fullscreen no disponible:', error);
          }
        }
      }
    });

    // Mostrar hint de fullscreen
    function showFsHint() {
      fsHint.classList.remove('hidden');
      setTimeout(() => {
        fsHint.style.opacity = '0';
      }, 3500);
      setTimeout(() => {
        fsHint.classList.add('hidden');
        fsHint.style.opacity = '1';
      }, 4000);
    }

    // Escuchar cambios de fullscreen
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        fullscreenRequested = false;
      }
      checkOrientation();
    });

    document.addEventListener('webkitfullscreenchange', () => {
      if (!document.webkitFullscreenElement) {
        fullscreenRequested = false;
      }
      checkOrientation();
    });

    // Escuchar cambios de orientación
    window.addEventListener('orientationchange', checkOrientation);
    window.addEventListener('resize', checkOrientation);

    // Inicializar
    checkOrientation();

    // Mostrar hint de fullscreen después de la animación
    setTimeout(() => {
      if (isMobileDevice()) {
        showFsHint();
      }
    }, 10000);
  </script>
</body>
</html>
