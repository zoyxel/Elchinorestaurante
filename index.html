<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta Giratoria El Chino</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    /* Portrait overlay */
    #portrait-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      gap: 2rem;
    }

    #portrait-overlay.hidden {
      display: none;
    }

    .phone-icon {
      font-size: 4rem;
      animation: rotatePhone 3s ease-in-out infinite;
    }

    @keyframes rotatePhone {
      0%, 20% { transform: rotate(0deg); }
      50%, 70% { transform: rotate(-90deg); }
      100% { transform: rotate(0deg); }
    }

    #portrait-overlay h1 {
      color: #fff;
      font-size: 1.8rem;
      font-weight: bold;
      margin-top: 1rem;
    }

    #portrait-overlay p {
      color: #ccc;
      font-size: 1.1rem;
      max-width: 500px;
      line-height: 1.6;
    }

    /* Container principal */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 1rem;
      width: 100%;
      max-width: 1200px;
    }

    /*
      FLIP CARD — técnica de transformación 3D segura para producción.

      Causa del bug de "cara trasera espejada" (ya resuelto):
      1) El elemento interactivo era un <button>. Varios navegadores
         aplanan el contexto 3D dentro de un <button> en vez de
         preservarlo. Se cambió a un <div role="button"> con manejo de
         teclado.
      2) `overflow: hidden` + `border-radius` estaban en el mismo
         elemento que lleva `transform-style: preserve-3d`
         (.flip-inner). Se movieron al .flip-card exterior (no
         transformado) y a cada cara individual.

      NUEVO — tamaño de pantalla + zoom (esta actualización):
      - .flip-card ahora usa min(vw, vh * ratio) para ocupar el máximo
        espacio disponible respetando el aspecto de la imagen, tanto en
        el navegador normal como en pantalla completa.
      - Se agregó pellizco para zoom (pinch), doble toque para
        ampliar/restaurar, y arrastre para desplazar la imagen ampliada,
        activo solo en modo pantalla completa. Ver JS al final.
    */

    .flip-card {
      perspective: 1200px;
      -webkit-perspective: 1200px;
      cursor: pointer;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      transition: box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;

      /* Tamaño: ocupa el máximo posible respetando el aspecto 550/366,
         limitado tanto por el ancho como por el alto del viewport. */
      width: min(94vw, calc(80vh * 550 / 366));
      aspect-ratio: 550 / 366;
    }

    /* En pantalla completa, aprovechar casi toda la pantalla */
    :fullscreen .flip-card,
    :-webkit-full-screen .flip-card {
      width: min(98vw, calc(98vh * 550 / 366));
    }

    .flip-card:active {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
    }

    .flip-card:hover {
      box-shadow: 0 25px 70px rgba(255, 0, 0, 0.3);
    }

    .flip-card:focus-visible {
      outline: 3px solid #ff3b30;
      outline-offset: 4px;
    }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      will-change: transform;
    }

    .flip-card.is-flipped .flip-inner {
      transform: rotateY(180deg) translateZ(0);
      -webkit-transform: rotateY(180deg) translateZ(0);
    }

    .flip-card.auto-flip .flip-inner {
      animation: autoFlip 8s ease-in-out 1s forwards;
    }

    @keyframes autoFlip {
      0% { transform: rotateY(0deg) translateZ(0); }
      25% { transform: rotateY(180deg) translateZ(0); }
      50% { transform: rotateY(360deg) translateZ(0); }
      75% { transform: rotateY(540deg) translateZ(0); }
      100% { transform: rotateY(720deg) translateZ(0); }
    }

    .flip-front, .flip-back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      -moz-backface-visibility: hidden;
      transform: rotateY(0deg) translateZ(0);
      -webkit-transform: rotateY(0deg) translateZ(0);
    }

    .flip-back {
      transform: rotateY(180deg) translateZ(0);
      -webkit-transform: rotateY(180deg) translateZ(0);
    }

    .menu-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      background: #000;
      pointer-events: none;
      will-change: transform;
      transform-origin: center center;
    }

    /* Hint text */
    .flip-hint {
      color: #fff;
      font-size: 0.9rem;
      text-align: center;
      font-weight: 500;
      letter-spacing: 0.05em;
      animation: pulse 2s ease-in-out infinite;
      margin-bottom: 1rem;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* Fullscreen hint toast */
    #fs-hint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(220, 38, 38, 0.9);
      color: #fff;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      z-index: 9998;
      opacity: 1;
      transition: opacity 0.5s ease;
      max-width: 90%;
      text-align: center;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    #fs-hint.hidden {
      display: none;
    }

    :fullscreen {
      background: #000;
      overflow: hidden;
    }

    :-webkit-full-screen {
      background: #000;
      overflow: hidden;
    }

    /* Animation demo text */
    .demo-text {
      color: #888;
      font-size: 0.8rem;
      margin-top: 0.5rem;
      opacity: 0;
      animation: fadeOut 2s ease-in 7s forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Portrait orientation overlay -->
  <div id="portrait-overlay" class="hidden">
    <div class="phone-icon">📱</div>
    <div>
      <h1>Gira tu dispositivo</h1>
      <p>Para una mejor experiencia, por favor coloca tu teléfono en modo horizontal</p>
    </div>
  </div>

  <!-- Fullscreen hint -->
  <div id="fs-hint" class="hidden">
    Toca el menú para activar pantalla completa
  </div>

  <!-- Main content -->
  <div class="container">
    <div class="flip-card auto-flip" id="flip-btn" role="button" tabindex="0" aria-pressed="false" aria-label="Girar carta de menú">
      <div class="flip-inner">
        <div class="flip-front">
          <img src="cara1-hamburguesas.webp" alt="Menú - Hamburguesas" class="menu-image" loading="lazy">
        </div>
        <div class="flip-back">
          <img src="cara2-pizzas.webp" alt="Menú - Pizzas" class="menu-image" loading="lazy">
        </div>
      </div>
    </div>
    <p class="flip-hint">👆 Toca para girar | Toca de nuevo para pantalla completa | Pellizca para zoom</p>
    <p class="demo-text">Viendo ambas caras...</p>
  </div>

  <script>
    const card = document.getElementById('flip-btn');
    const overlay = document.getElementById('portrait-overlay');
    const fsHint = document.getElementById('fs-hint');
    const flipInner = document.querySelector('.flip-inner');
    const frontImg = document.querySelector('.flip-front .menu-image');
    const backImg = document.querySelector('.flip-back .menu-image');

    let fullscreenRequested = false;
    let isAutoFlipping = true;

    // Detectar si es móvil
    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
             ('ontouchstart' in window) ||
             (navigator.maxTouchPoints && navigator.maxTouchPoints > 2);
    }

    // Revisar orientación
    function checkOrientation() {
      const isPortrait = window.matchMedia('(orientation: portrait)').matches;
      const isMobile = isMobileDevice();

      if (isMobile && isPortrait && !document.fullscreenElement) {
        overlay.classList.remove('hidden');
      } else {
        overlay.classList.add('hidden');
      }
    }

    // Detener animación de auto-flip después de 9 segundos
    setTimeout(() => {
      isAutoFlipping = false;
      card.classList.remove('auto-flip');
    }, 9000);

    // ---------- Zoom y desplazamiento (solo en pantalla completa) ----------
    const zoomState = {
      front: { scale: 1, x: 0, y: 0 },
      back: { scale: 1, x: 0, y: 0 }
    };

    function activeFaceKey() {
      return card.classList.contains('is-flipped') ? 'back' : 'front';
    }

    function imgFor(key) {
      return key === 'back' ? backImg : frontImg;
    }

    function faceElFor(key) {
      return key === 'back' ? document.querySelector('.flip-back') : document.querySelector('.flip-front');
    }

    function applyZoom(key) {
      const st = zoomState[key];
      imgFor(key).style.transform = `translate(${st.x}px, ${st.y}px) scale(${st.scale})`;
    }

    function resetZoom(key, animate) {
      const st = zoomState[key];
      st.scale = 1;
      st.x = 0;
      st.y = 0;
      const img = imgFor(key);
      if (animate) {
        img.style.transition = 'transform 0.25s ease';
        setTimeout(() => { img.style.transition = ''; }, 260);
      }
      applyZoom(key);
    }

    function isZoomed() {
      return zoomState[activeFaceKey()].scale > 1.02;
    }

    function clampPan(key) {
      const st = zoomState[key];
      const face = faceElFor(key);
      const maxX = (st.scale - 1) * face.clientWidth / 2;
      const maxY = (st.scale - 1) * face.clientHeight / 2;
      st.x = Math.min(Math.max(st.x, -maxX), maxX);
      st.y = Math.min(Math.max(st.y, -maxY), maxY);
    }

    const activePointers = new Map();
    let pinchStartDist = 0;
    let pinchStartScale = 1;
    let panStart = null;
    let lastTapTime = 0;
    let didPinchOrPan = false;

    flipInner.addEventListener('pointerdown', (event) => {
      if (!document.fullscreenElement || isAutoFlipping) return;
      event.preventDefault();

      activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });

      if (activePointers.size === 2) {
        didPinchOrPan = true;
        const pts = Array.from(activePointers.values());
        pinchStartDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
        pinchStartScale = zoomState[activeFaceKey()].scale;
      } else if (activePointers.size === 1) {
        const key = activeFaceKey();
        panStart = { x: event.clientX, y: event.clientY, ox: zoomState[key].x, oy: zoomState[key].y };

        const now = Date.now();
        if (now - lastTapTime < 300) {
          didPinchOrPan = true;
          const st = zoomState[key];
          const img = imgFor(key);
          img.style.transition = 'transform 0.25s ease';
          if (st.scale > 1.02) {
            resetZoom(key, false);
          } else {
            st.scale = 2.5;
            applyZoom(key);
          }
          setTimeout(() => { img.style.transition = ''; }, 260);
        }
        lastTapTime = now;
      }
    });

    flipInner.addEventListener('pointermove', (event) => {
      if (!activePointers.has(event.pointerId)) return;
      activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      const key = activeFaceKey();

      if (activePointers.size === 2 && pinchStartDist) {
        didPinchOrPan = true;
        const pts = Array.from(activePointers.values());
        const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
        zoomState[key].scale = Math.min(Math.max(pinchStartScale * (dist / pinchStartDist), 1), 4);
        clampPan(key);
        applyZoom(key);
      } else if (activePointers.size === 1 && panStart && zoomState[key].scale > 1.02) {
        didPinchOrPan = true;
        zoomState[key].x = panStart.ox + (event.clientX - panStart.x);
        zoomState[key].y = panStart.oy + (event.clientY - panStart.y);
        clampPan(key);
        applyZoom(key);
      }
    });

    function endPointer(event) {
      activePointers.delete(event.pointerId);
      if (activePointers.size < 2) pinchStartDist = 0;
      if (activePointers.size === 0) panStart = null;
    }
    flipInner.addEventListener('pointerup', endPointer);
    flipInner.addEventListener('pointercancel', endPointer);
    flipInner.addEventListener('pointerleave', endPointer);

    // Lógica compartida de activación (click y teclado)
    async function activateCard(event) {
      event.preventDefault();

      if (isAutoFlipping) return; // No permitir activación durante auto-flip

      // Si se acaba de hacer zoom/pan, o la cara visible está ampliada,
      // no girar la tarjeta (el toque se usó para zoom, no para girar)
      if (didPinchOrPan) {
        didPinchOrPan = false;
        return;
      }
      if (isZoomed()) return;

      // Reiniciar el zoom de ambas caras al girar
      resetZoom('front', false);
      resetZoom('back', false);

      // Girar la tarjeta
      const isFlipped = card.classList.toggle('is-flipped');
      card.setAttribute('aria-pressed', String(isFlipped));

      // Solicitar fullscreen al tocar (después de girar)
      if (!fullscreenRequested && !document.fullscreenElement) {
        fullscreenRequested = true;

        const elem = document.documentElement;
        const requestFullscreen = elem.requestFullscreen ||
                                 elem.webkitRequestFullscreen ||
                                 elem.mozRequestFullScreen ||
                                 elem.msRequestFullscreen;

        if (requestFullscreen) {
          try {
            await requestFullscreen.call(elem);
            showFsHint();
          } catch (error) {
            fullscreenRequested = false;
            console.log('Fullscreen no disponible:', error);
          }
        }
      }
    }

    // Evento de click/tap en la tarjeta
    card.addEventListener('click', activateCard);

    // Evento de teclado (Enter / Espacio) — paridad de accesibilidad
    // ahora que el elemento es un <div> en lugar de un <button>
    card.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ' || event.key === 'Spacebar') {
        activateCard(event);
      }
    });

    // Mostrar hint de fullscreen
    function showFsHint() {
      fsHint.classList.remove('hidden');
      setTimeout(() => {
        fsHint.style.opacity = '0';
      }, 3500);
      setTimeout(() => {
        fsHint.classList.add('hidden');
        fsHint.style.opacity = '1';
      }, 4000);
    }

    // Escuchar cambios de fullscreen
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        fullscreenRequested = false;
        resetZoom('front', false);
        resetZoom('back', false);
      }
      checkOrientation();
    });

    document.addEventListener('webkitfullscreenchange', () => {
      if (!document.webkitFullscreenElement) {
        fullscreenRequested = false;
        resetZoom('front', false);
        resetZoom('back', false);
      }
      checkOrientation();
    });

    // Escuchar cambios de orientación
    window.addEventListener('orientationchange', checkOrientation);
    window.addEventListener('resize', checkOrientation);

    // Inicializar
    checkOrientation();

    // Mostrar hint de fullscreen después de la animación
    setTimeout(() => {
      if (isMobileDevice()) {
        showFsHint();
      }
    }, 10000);
  </script>
</body>
</html>
